<mat-toolbar class="toolbar">
  <span class="toolbar-title">💰 Gestione Spese</span>
  <span class="spacer"></span>
  <span class="user-email">{{ userEmail }}</span>
  <button mat-button class="logout-btn" (click)="logout()">Esci</button>
</mat-toolbar>

<mat-tab-group class="tabs-container">
  <mat-tab label="Registra spesa">
    <app-expense-form />
  </mat-tab>
  <mat-tab label="Storico">
    <app-expense-list />
  </mat-tab>
  <mat-tab label="Riepilogo">
    <app-overview />
  </mat-tab>
  <mat-tab label="Persone">
    <app-people />
  </mat-tab>
  <mat-tab label="Categorie">
    <app-categories />
  </mat-tab>
</mat-tab-group>
