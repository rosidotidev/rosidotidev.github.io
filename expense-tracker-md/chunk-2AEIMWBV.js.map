<mat-card>
  @if (adding) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  }
  <mat-card-header>
    <mat-card-title>Categorie</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="add-row">
      <mat-form-field appearance="outline">
        <mat-label>Nome categoria</mat-label>
        <input matInput [(ngModel)]="newName" placeholder="Nome categoria"
               (keydown.enter)="add()" [disabled]="adding">
      </mat-form-field>
      <button mat-flat-button color="primary" (click)="add()" [disabled]="adding">Aggiungi</button>
    </div>

    @if ((categories$ | async); as categories) {
      @if (categories.length === 0) {
        <p class="empty-state">Nessuna categoria.</p>
      } @else {
        <mat-chip-set>
          @for (cat of categories; track cat) {
            <mat-chip>
              {{ cat }}
              <button matChipRemove (click)="remove(cat)">
                <mat-icon>cancel</mat-icon>
              </button>
            </mat-chip>
          }
        </mat-chip-set>
      }
    }
  </mat-card-content>
</mat-card>
