<mat-card>
  @if (adding) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  }
  <mat-card-header>
    <mat-card-title>Persone</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="add-row">
      <mat-form-field appearance="outline">
        <mat-label>Nome persona</mat-label>
        <input matInput [(ngModel)]="newName" placeholder="Nome persona"
               (keydown.enter)="add()" [disabled]="adding">
      </mat-form-field>
      <button mat-flat-button color="primary" (click)="add()" [disabled]="adding">Aggiungi</button>
    </div>

    @if ((people$ | async); as people) {
      @if (people.length === 0) {
        <p class="empty-state">Nessuna persona aggiunta.</p>
      } @else {
        <mat-chip-set>
          @for (person of people; track person) {
            <mat-chip>
              {{ person }}
              <button matChipRemove (click)="remove(person)">
                <mat-icon>cancel</mat-icon>
              </button>
            </mat-chip>
          }
        </mat-chip-set>
      }
    }
  </mat-card-content>
</mat-card>
